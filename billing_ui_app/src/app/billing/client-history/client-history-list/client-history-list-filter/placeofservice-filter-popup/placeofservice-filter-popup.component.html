<div class="patient-search-popup">
    <div class="mb-3 d-flex w-100 patient-search-input">
        <span class="ml-2 icon-24 search-icon"></span>
        <input #searchInput placeholder="Search" (keyup)="posSearchValueChanged($event)"/>
    </div>

    <div [ngClass]="isLoading ? 'patients-list loading mb-2' : 'patients-list mb-2'" style="display: flow !important;" *ngIf="placeOfServices.length > 0">
        <div class="patient-item" (click)="selectAll(placeOfServices)">
            <input role="button" type="checkbox" [checked]="isAllSelect">
            <span class="ml-2">Select All</span>
        </div>
        <div *ngFor="let pos of placeOfServices" (click)="onPOSClicked(pos)" class="patient-item">
            <input type="checkbox" readonly [checked]="pos.checked"/>
            <span class="ml-2">{{pos.name}}</span>
        </div>
    </div>
    <div>
        <ng-template [ngIf]="placeOfServices.length">
            <div *ngIf="placeOfServices.length == 1; else notOne">
                <span>{{placeOfServices.length}} item</span>
            </div>
            <ng-template #notOne>
                <span>{{placeOfServices.length}} items</span>
            </ng-template>
        </ng-template>
        <!-- <mat-spinner *ngIf="isLoading"></mat-spinner> -->
    </div>
</div>
