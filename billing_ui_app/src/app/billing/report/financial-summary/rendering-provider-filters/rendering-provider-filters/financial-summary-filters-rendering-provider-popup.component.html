<div class="rendering-provider-search-popup">
    <div class="mb-3 d-flex w-100 rendering-provider-search-input">
        <span class="ml-2 icon-24 search-icon"></span>
        <input #searchInput placeholder="Search" (keyup)="renderingProvidersSearchValueChanged($event)"/>
    </div>

    <div [ngClass]="isLoading ? 'rendering-providers-list loading mb-2' : 'rendering-providers-list mb-2'" *ngIf="renderingProviders.length > 0">
        <div class="rendering-provider-item" (click)="selectAll(renderingProviders)">
            <input role="button" type="checkbox" [checked]="isAllSelect">
            <span class="ml-2">Select All</span>
        </div>
        <div *ngFor="let renderingProvider of renderingProviders" (click)="onRenderingProviderClicked(renderingProvider)" class="rendering-provider-item">
            <input type="checkbox" readonly [checked]="renderingProvider.checked"/>
            <span class="ml-2">{{renderingProvider.name}}</span>
        </div>
    </div>
    <div>
        <ng-template [ngIf]="renderingProviders.length">
            <div *ngIf="renderingProviders.length == 1; else notOne">
                <span>{{renderingProviders.length}} item</span>
            </div>
            <ng-template #notOne>
                <span>{{renderingProviders.length}} items</span>
            </ng-template>
        </ng-template>
        <mat-spinner *ngIf="isLoading"></mat-spinner>
    </div>
</div>
