<div class="patient-search-popup">
    <div class="mb-3 d-flex w-100 patient-search-input">
        <span class="ml-2 icon-24 search-icon"></span>
        <input #searchInput placeholder="Search" (keyup)="patientsSearchValueChanged($event)"/>
    </div>

    <div [ngClass]="isLoading ? 'patients-list loading mb-2' : 'patients-list mb-2'" style="display: flow !important;" *ngIf="patients.length > 0">
        <div class="patient-item" (click)="selectAll(!isAllSelect)">
            <input role="button" type="checkbox" [checked]="isAllSelect">
            <span class="ml-2">Select All</span>
        </div>
        <div *ngFor="let patient of patients" (click)="onPatientClicked(patient)" class="patient-item">
            <input type="checkbox" readonly [checked]="patient.checked"/>
            <span class="ml-2">{{patient.name}}</span>
        </div>
    </div>
    <div>
        <ng-template [ngIf]="patients.length">
            <div *ngIf="patients.length == 1; else notOne">
                <span>{{patients.length}} item</span>
            </div>
            <ng-template #notOne>
                <span>{{patients.length}} items</span>
            </ng-template>
        </ng-template>
        <mat-spinner *ngIf="isLoading"></mat-spinner>
    </div>
</div>
