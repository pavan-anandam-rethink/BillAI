<kendo-popup #popup [anchor]="anchor" [margin]="margin" popupClass="new-style-popup" (anchorViewportLeave)="anchorViewportLeave.emit()">
    <div class="new-style date-filter-popup">
        <div class="content">
            <div class="d-flex justify-content-between mb-4">
                <div class="d-flex"><span class="icon-24 back chevron-left-icon pointer" (click)="clickPrev()"></span></div>
                <div class="d-flex flex-column justify-content-center"><span class="Body1 bold">{{calendarTitleString}}</span></div>
                <div class="d-flex"><span class="icon-24 back chevron-right-icon pointer" (click)="clickNext()"></span></div>
            </div>
            <div class="d-flex justify-content-center mb-4">
                <div class="filter-date-selector d-flex">
                    <span class="icon-24 back scheduling-icon pointer ml-3 mr-2" (click)="rangeStart.focus()"></span>
                    <kendo-dateinput #rangeStart class="w-100" [(value)]="range.start"></kendo-dateinput>
                </div>
                <div class="filter-date-selector d-flex">
                    <span class="icon-24 back scheduling-icon pointer ml-3 mr-2" (click)="rangeEnd.focus()"></span>
                    <kendo-dateinput #rangeEnd class="w-100" [(value)]="range.end"></kendo-dateinput>
                </div>
            </div>
        </div>
        <kendo-multiviewcalendar kendoDateRangeSelection
                                 [selectionRange]="range"
                                 [weekNumber]="false"
                                 [views]="1"
                                 class="date-filter-selector"
                                 (selectionRangeChange)="range=$event">
        </kendo-multiviewcalendar>
        <div class="d-flex justify-content-end btns">
            <outlined-btn kendoButton (click)="emitClose()" text="Close"></outlined-btn>
            <contained-btn kendoButton (click)="emitDate()" text="Apply" class="ml-3 mr-3"></contained-btn>
        </div>
    </div>
</kendo-popup>
