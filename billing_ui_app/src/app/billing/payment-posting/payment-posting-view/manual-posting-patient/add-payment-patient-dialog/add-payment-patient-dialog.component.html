<kendo-dialog>
  <div class="d-flex">
    <div class="Header-4">
      Add Patient
    </div>
    <mat-spinner class="ml-2" *ngIf="isLoading"></mat-spinner>
  </div>

  <div class="col-md-12 patient-search-result-wrapper">
    <div #patientSearchContainer class="d-flex patient-search-input-container">
      <span class="ml-2 icon-24 search-icon"></span>
      <kendo-autocomplete #patientAutocomplete
                          class="patient-search-input h-100"
                          [placeholder]="'Search Patient List'"
                          [data]="patients"
                          [popupSettings]="{popupClass: 'new-style-popup'}"
                          [filterable]="true"
                          [valueField]="'patientName'"
                          (valueChange)="valueChanged($event)"
                          [value]="patientSearchRequest.personName"
                          (filterChange)="patientsSearchValueChange($event)"
                          (focus)="patientsSearchValueChange()"
                          (close)="onCloseAutocomplete($event)">
        <ng-template kendoAutoCompleteItemTemplate let-patientItem>
          <div class="w-100 patient-item" (click)="patientClick(patientItem)">
            <input type="checkbox" [checked]="patientItem.checked">
            <span class="ml-2">
              {{patientItem.patientName}}
            </span>
          </div>
        </ng-template>
      </kendo-autocomplete>
    </div>

    <div class="patient-search-result-wrapper">
      <div *ngIf="selectedPatients.length == 1; else moreThanOne">
        <span>1 Selected Patient</span>
      </div>
      <ng-template #moreThanOne>
        <span>{{selectedPatients.length}} Selected Patients</span>
      </ng-template>

      <div *ngIf="selectedPatients.length > 0" class="patients-list">
        <div *ngFor="let patient of selectedPatients">
          <div class="selected-patient-row">
            <div class="d-flex">
              <div class="default-user-icon">{{getInitials(patient)}}</div>
              <div class="patient-name">{{patient.patientName}}</div>
            </div>

            <div class="d-flex align-items-center justify-content-between mr-20">
              <span>
                <input [id]="'payment-' + patient.id"
                       type="number"
                       class="form-control payment-input"
                       [(ngModel)]="patient.paymentAmounts"
                       [name]="'paymentAmount_' + patient.id"
                       required
                      
                       step="0.01"
                       inputmode="decimal"
                       placeholder="Enter amount"
                       />
              </span>

              <span class="icon-24 notes-r-icon"
                    [(ngModel)]="patient.notes"
                    (click)="openNoteDialog(patient)"
                    [title]="patient.notes ? patient.notes : 'Enter note here'"
                    [ngClass]="{'disabled': selectedPatients.length === 0}">
              </span>

              <div class="d-flex mr-3 trash-container">
                <span class="icon-24 trash-icon pointer" (click)="uncheckPatient(patient)"></span>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Note Dialog -->
  <div *ngIf="showNoteDialog" class="note-dialog-container">
    <div [formGroup]="formGroup">
      <div class="row">
        <div class="col-12 notes-container">
          <div class="notes-header">Claim Notes</div>
          <textarea class="form-control text-area"
                    formControlName="note"
                    placeholder="Type Here"
                    (keyup)="checkTextArea()"
                    [ngClass]="{
                    FieldError: formGroup.controls['note'].touched && formGroup.controls['note'].invalid
                  }">
        </textarea>
        </div>
      </div>
    </div>
    <div class="patient-search-dialog-buttons flex-end-css">
      <outlined-btn class="btn-cancel" text="Cancel" (onClick)="cancelNote()"></outlined-btn>
      <contained-btn class="btn-add" text="Add Note" (onClick)="addNote()"
                     [isDisabled]="AddNote"></contained-btn>
    </div>

  </div>
  <div class="patient-search-dialog-buttons flex-end-css">
    <outlined-btn text="Cancel" (onClick)="onCloseDialog()"></outlined-btn>
    <contained-btn text="Add Patient" (onClick)="addPatientClaims()"
                   [isDisabled]="isAddPatientBtnDisabled"></contained-btn>
  </div>
</kendo-dialog>
