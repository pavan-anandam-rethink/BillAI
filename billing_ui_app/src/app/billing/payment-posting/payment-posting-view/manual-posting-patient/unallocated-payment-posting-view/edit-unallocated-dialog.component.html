<kendo-dialog>
  <div class="d-flex">
    <div class="Header-4">
      Add Unallocated Payment
    </div>

  </div>
  <div class="body" style="display: block;">

    <form class="k-form" [formGroup]="form" style="padding:0;">
      <div class="row justify-content-between mb-3">
        <div class="col-md-12">
          <label for="unallocatedAmount">Unallocated Amount*</label>
          <input
            kendoTextBox
            id="unallocatedAmount"
            type="number"
            formControlName="paymentAmount"
            class="w-100 k-textbox no-spinner"
            placeholder="Enter amount"
            inputmode="decimal"
            pattern="[0-9]*[.,]?[0-9]{0,2}"
            [min]="0"
            (keydown)="preventNegative($event)"
            (paste)="blockNegativePaste($event)"
            (input)="limitDecimalPlaces($event)"
            style="width:100% !important;"/>
          <div 
            class="validation-msg mt-1">
            <small *ngIf="form.controls.paymentAmount.errors?.required" class="text-danger">
              Payment amount is required.
            </small>
          </div>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-12">
          <label for="note">Notes</label>
          <textarea kendoTextArea id="note" formControlName="note" rows="3" placeholder="Add a note (optional)"
            class="w-100"></textarea>
        </div>
      </div>
    </form>
  </div>

  <div class="d-flex mt-3 mb-1 justify-content-end">
    <outlined-btn text="Cancel" (click)="onCancel()"></outlined-btn>
    <contained-btn text="Save" (click)="onSave()" class="ml-3"></contained-btn>
  </div>

</kendo-dialog>
