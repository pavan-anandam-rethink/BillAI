<div class="main">
  <manual-payment-details-info
    #paymentPatientSummary
    *ngIf="paymentShortInfo.isPatientType"
    (onPaymentSummaryUpdate)="updateClaimDetails()"
    (updateStatus)="loadPaymentShortInfo($event)"
    [paymentId]="paymentShortInfo.id"
    [paymentIdentifier]="paymentShortInfo.paymentIdentifier"
  ></manual-payment-details-info>
  <payment-details-info
    #paymentOtherSummary
    *ngIf="paymentShortInfo.isOtherType"
    [paymentId]="paymentShortInfo.id"
    [paymentIdentifier]="paymentShortInfo.paymentIdentifier"
  ></payment-details-info>
  <div class="grid-area">
    <div class="header-actions-wrapper">
      <div style="display: flex">
        <contained-btn
          *ngIf="canEdit && isRevSpringPayment === false"
          text="Add Patient"
          iconClass="icon-24 add-circle-icon"
          (click)="addPatientDialogToggle()"
          style="margin-left: 12px"
        >
        </contained-btn>
        <div class="form-group paid-filter">
          <input
            type="checkbox"
            class="k-checkbox"
            kendoCheckBox
            id="showPaid"
            [(ngModel)]="showPaid"
            (change)="togglePaid(showPaid)"
          />
          <label for="showPaid" class="k-checkbox-label">Show Paid</label>
        </div>
      </div>
      <div class="row" style="margin-right: 8px">
        <div class="icon-wrapper-filter" *ngIf="canEdit">
          <span
            class="icon-24 trash-icon"
            title="Delete the payments made for the selected linked charges."
            [ngClass]="{ disabled: deleteBtnDisabled }"
            (click)="
              deleteBtnDisabled ? $event.preventDefault() : openConfirmDialog()
            "
          ></span>
        </div>
      </div>
    </div>

    <div class="claim-list">
      <div id="claims" class="tab-content">
        <kendo-grid
          #manualPaymentGrid
          id="manualPaymentGrid"
          *ngIf="!redraw"
          [data]="view | async"
          [pageSize]="gridState.take"
          [skip]="gridState.skip"
          [sort]="gridState.sortingModels"
          [pageable]="pagingSettings"
          [sortable]="{ mode: 'single' }"
          (sortChange)="onSortChange($event)"
          [navigable]="false"
          kendoGridSelectBy="patientId"
          [selectable]="{ enabled: true, checkboxOnly: true }"
          [selectedKeys]="mySelection"
          (pageChange)="onPageChange($event)"
        >
          <kendo-grid-column
            field="patientName"
            title="Patient"
            class="border-bottom border-top p-0"
            [width]="200"
          >
            <ng-template kendoGridHeaderTemplate let-column>
              <span title="{{ column.title }}">{{ column.title }}</span>
            </ng-template>
            <ng-template kendoGridCellTemplate let-dataItem>
              <div
                class="nav-link"
                (click)="showClientInfo(dataItem.patientId)"
              >
                {{ dataItem.patientName }}
              </div>
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-column
            field="unallocatedPayment"
            title="Unallocated Amount"
            format="{0:c2}"
            [width]="200"
          >
            <ng-template kendoGridHeaderTemplate let-column>
              <span title="{{ column.title }}">{{ column.title }}</span>
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-column
            field="patientResponsibility"
            title="Patient Responsibility"
            format="{0:c2}"
            [width]="175"
          >
            <ng-template kendoGridHeaderTemplate let-column>
              <span title="{{ column.title }}">{{ column.title }}</span>
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-column
            field="patientPayment"
            title="Patient Payment"
            format="{0:c2}"
            [width]="150"
          >
            <ng-template kendoGridHeaderTemplate let-column>
              <span title="{{ column.title }}">{{ column.title }}</span>
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-column
            field="patientResponsibilityBalance"
            title="Patient Balance"
            format="{0:c2}"
            [width]="150"
          >
            <ng-template kendoGridHeaderTemplate let-column>
              <span title="{{ column.title }}">{{ column.title }}</span>
            </ng-template>
          </kendo-grid-column>
          <!-- --------------------------------- -->
          <kendo-grid-column
            *ngIf="canEdit"
            field="actions"
            [sortable]="false"
            title=""
            class="border-bottom border-top p-0"
            [width]="100"
          >
            <ng-template kendoGridCellTemplate let-dataItem>
              <div class="status Body2 action-icons">
                <div>
                  <span
                    *ngIf="canEdit"
                    class="icon-24 trash-icon"
                    title="Delete Patient"
                    (click)="openConfirmPatientDialog(dataItem.patientId)"
                  ></span>
                </div>
                <div>
                  <span
                    *ngIf="canEdit && isRevSpringPayment === false"
                    class="icon-24 edit-icon"
                    title="Edit Unallocated Payment"
                    (click)="openEditUnallocatedDialog(dataItem, $event)"
                  ></span>
                </div>
              </div>
            </ng-template>
          </kendo-grid-column>
          <!-- --------------------------------- -->

          <kendo-grid-checkbox-column [showSelectAll]="true" [width]="50">
            <ng-template kendoGridHeaderTemplate>
              <input
                kendoCheckBox
                type="checkbox"
                [checked]="this._selectAllLines"
                (change)="selectionLinesChanged($event, 0)"
              />
            </ng-template>
            <ng-template kendoGridCellTemplate let-dataItem>
              <input
                type="checkbox"
                [checked]="dataItem.checked"
                (change)="selectionLinesChanged($event, dataItem.patientId)"
              />
            </ng-template>
          </kendo-grid-checkbox-column>

          <ng-template kendoGridDetailTemplate let-dataItem>
            <div class="scroller">
              <div class="scrollBar">
                <div class="Body1 mb-1">Linked Charges</div>
                <patient-claim-details
                  [paymentId]="dataItem.paymentId"
                  [showPaid]="gridState.showPaid"
                  [patientId]="dataItem.patientId"
                  [isLinked]="true"
                  [isDataItemChecked]="dataItem.checked"
                  [isLinkedDataItemChecked]="dataItem.linkedchecked"
                  (updateClaim)="updateClaim($event)"
                  (selectedLinesChangeEmitter)="
                    changeLineSelections($event, true)
                  "
                  (allLinkedLinesChangeEmitter)="
                    changePatientSelectionForLinked($event)
                  "
                  [selectAllLines]="selectAllClaimLines(dataItem.patientId)"
                >
                </patient-claim-details>
                <div class="Body1 mb-1 mt-3">Unlinked Charges</div>
                <patient-claim-details-unlink
                  [paymentId]="dataItem.paymentId"
                  [showPaid]="gridState.showPaid"
                  [patientId]="dataItem.patientId"
                  [isLinked]="false"
                  (updateClaim)="updateClaim($event)"
                  (selectedLinesChangeEmitter)="
                    changeLineSelections($event, false)
                  "
                  (allUnlinkedLinesChangeEmitter)="
                    changePatientSelectionForUnlinked($event)
                  "
                  [selectAllLines]="selectAllClaimLines(dataItem.patientId)"
                >
                </patient-claim-details-unlink>
              </div>
            </div>
          </ng-template>

          <ng-template
            kendoPagerTemplate
            let-totalPages="totalPages"
            let-currentPage="currentPage"
            let-total="total"
          >
            <div
              style="display: flex; width: 100%; justify-content: space-between"
            >
              <div style="margin: auto 0" *ngIf="total > 0" class="Body1">
                Displaying {{ getPageStart(total) }}–{{ getPageEnd(total) }} of
                {{ total }} items
              </div>
              <div style="display: flex" class="customePageator">
                <kendo-pager-page-sizes
                  [pageSizes]="gridPageSizes"
                ></kendo-pager-page-sizes>
                <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                <kendo-pager-numeric-buttons
                  [buttonCount]="5"
                ></kendo-pager-numeric-buttons>
                <kendo-pager-next-buttons></kendo-pager-next-buttons>
              </div>
            </div>
          </ng-template>
          <ng-template kendoGridNoRecordsTemplate>
            <span class="k-display-flex justify-content-center"
              >Please add a patient to this payment.</span
            >
          </ng-template>
        </kendo-grid>
      </div>
    </div>
  </div>
</div>

<confirmation-dialog
  [confirmDialog]="confirmDeleteDialog"
  (onConfirm)="onDeletePayments($event)"
>
</confirmation-dialog>
<confirmation-dialog
  [confirmDialog]="confirmDeletePatientDialog"
  (onConfirm)="onDeletePatient($event)"
>
</confirmation-dialog>
<notify-dialog [notifyDialog]="notifyDialog"></notify-dialog>

<add-payment-patient-dialog
  *ngIf="showAddPatientDialog"
  (closeDialogEmitter)="addPatientDialogToggle($event)"
  [paymentId]="this.gridState.paymentId"
>
</add-payment-patient-dialog>

<edit-unallocated-dialog
  *ngIf="showEditUnallocatedDialog"
  [patientId]="editDialogModel?.patientId"
  [patientName]="editDialogModel?.patientName"
  [currentUnallocated]="editDialogModel?.currentUnallocated"
  [note]="editDialogModel?.note"
  (closeDialogEmitter)="onEditUnallocatedClose($event)"
>
</edit-unallocated-dialog>

<kendo-popup
  [anchor]="hintAnchor"
  [anchorAlign]="{ horizontal: 'left', vertical: 'bottom' }"
  [popupAlign]="{ horizontal: 'left', vertical: 'top' }"
  *ngIf="showHint"
>
  <div class="flex justify-content-center hint-text">
    <span>{{ hintText }}</span>
  </div>
</kendo-popup>
<div kendoDialogContainer></div>
