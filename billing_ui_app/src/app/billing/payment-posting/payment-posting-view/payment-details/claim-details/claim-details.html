<div class="title" *ngIf="(claimDetails) as data;">
    <!-- <span class="title-icon icon-24 edit-icon"></span> -->
    <div class="title-text">Claim ID {{data.claimIdentifier}}</div>
</div>
<div class="body" *ngIf="(claimDetails) as data;">
    <div class="summary">
        <div class="header">Balance</div>
        <div class="details total Header-1">{{data.balance | currency}}</div>
    </div>

    <div>{{data.status}}</div>
    <div>Paid Amount : {{data.paidAmount | currency}}</div>
</div>
