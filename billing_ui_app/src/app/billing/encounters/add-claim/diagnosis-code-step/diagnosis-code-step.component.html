<div class="claim-details-block mb-7">
    <div class="title Header-5">Diagnosis Code</div>
    <div class="content new-style">
        <form [formGroup]="parentForm">
            <div formArrayName="formData" class="col-12">
                <ng-container [formGroupName]="2">
                    <div class="row sub-title mb-2">
                        <span class="Body2 small-13bld">Diagnosis Order*</span>
                    </div>

                    <div class="mb-4 d-flex flex-column-reverse" >
                        <div id="clientName" class="client-name">
                            <input kendoTextBox class="w-100 k-component" id="diagnosisCode" type="text"
                                [value]="getDiagnosisCodes" [class.ng-invalid]="
                                stepFormGroup.controls['diagnosisCodes'].invalid
                            " [class.ng-touched]="
                                stepFormGroup.controls['diagnosisCodes'].touched
                            " placeholder="Select"
                               readonly/>
                            <button class="icon-24 edit-icon pointer" [tabindex]="0" (click)="diagnosisCodeClick()"></button>

                        </div>
                    </div>
                </ng-container>
            </div>
        </form>
    </div>
</div>
