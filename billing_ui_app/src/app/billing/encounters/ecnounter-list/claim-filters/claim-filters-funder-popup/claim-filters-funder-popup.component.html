<div class="funder-search-popup">
    <div class="mb-3 d-flex w-100 funder-search-input">
        <span class="ml-2 icon-24 search-icon"></span>
        <input #searchInput placeholder="Search" (keyup)="fundersSearchValueChanged($event)"/>
    </div>

    <div [ngClass]="isLoading ? 'funders-list loading mb-2' : 'funders-list mb-2'" *ngIf="funders.length > 0">
        <div *ngFor="let funder of funders" (click)="onFunderClicked(funder)" class="funder-item">
            <input type="checkbox" readonly [checked]="funder.checked"/>
            <span class="ml-2">{{funder.name}}</span>
        </div>
    </div>
    <div>
        <ng-template [ngIf]="funders.length">
            <div *ngIf="funders.length == 1; else notOne">
                <span>{{funders.length}} item</span>
            </div>
            <ng-template #notOne>
                <span>{{funders.length}} items</span>
            </ng-template>
        </ng-template>
        <mat-spinner *ngIf="isLoading"></mat-spinner>
    </div>
</div>
