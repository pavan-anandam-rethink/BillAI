<div class="new-style">
    <kendo-dialog kendoTooltip title="Add Appointment" (close)="close()" [minWidth]="250"[width]="800">
        <mat-spinner style="margin: auto;" *ngIf="isLoading"></mat-spinner>
        <div *ngIf="!isLoading">
            <form [formGroup]="appointmentForm">
                <div *ngIf="appointments.length > 0 || searchString;" class="mb-3 d-flex w-100 appointment-search-input">
                    <span class="ml-2 icon-24 search-icon"></span>
                    <input placeholder="Search client appointments" (keyup)="appointmentSearchValueChanged($event)" />
                </div>
                <div class="wrap-row">
                    <div class="appointments-block">
                        <div (click)="appointmentClick($event, 0)" class="appointment-item pb-2">
                            <div *ngIf="appointments.length > 0; else noAppts"
                                class="d-flex flex-row justify-content-center">
                                <div class="d-flex col-1 justify-content-center align-items-center">
                                    <input id="selectAllCheckbox" type="checkbox" />
                                </div>
                                <div class="col-11 ml-2 d-flex align-items-center">
                                    <div class="d-flex flex-row">
                                        <div>
                                            Select all
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <ng-template #noAppts>
                                <div class="d-flex flex-row no-appts-text">
                                    <p>No appointments matching claim criteria</p>
                                </div>
                            </ng-template>
                        </div>
                        <div *ngFor="let appointment of appointments">
                            <div (click)="appointmentClick($event, appointment.id)" class="appointment-item pb-4">
                                <div class="d-flex flex-row justify-content-center">
                                    <div class="d-flex col-1 justify-content-center align-items-center">
                                        <input type="checkbox" [checked]="appointment.selected" />
                                    </div>
                                    <div class="col-11 ml-2">
                                        <div class="d-flex flex-row">
                                            <div class="flex-just w-100">
                                                <div>
                                                    {{appointment.timeRange}}
                                                </div>
                                            </div>
                                        </div>
                                        <div *ngIf="appointment.billingCode2 == null; else multipleBillingCodes"
                                            class="d-flex flex-row">
                                            {{appointment.serviceName}} - {{appointment.billingCode}}, with
                                            {{appointment.staffName}}
                                        </div>
                                        <ng-template #multipleBillingCodes>
                                            <div class="d-flex flex-row">
                                                {{appointment.serviceName}} -
                                                {{appointment.billingCode}}/{{appointment.billingCode2}}, with
                                                {{appointment.staffName}}
                                            </div>
                                        </ng-template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
            
        </div>
        <div class="d-flex mt-3 mb-1 justify-content-end">
            <outlined-btn (onClick)="close()" text="Cancel"></outlined-btn>
            <contained-btn [isDisabled]="!allowSave" (onClick)="createAppointment()" text="Submit"
                class="ml-3"></contained-btn>
        </div>
    </kendo-dialog>
</div>
