<kendo-popup #popup [anchor]="anchor" class="search-popup" (anchorViewportLeave)="anchorViewportLeave.emit()">
    <div [style.width.px]="anchor.nativeElement.offsetWidth - 26">
        <div class="mb-3 d-flex w-100 search-input">
            <span class="ml-2 icon-24 search-icon"></span>
            <input placeholder="Search" (keyup)="searchValueChanged($event)"/>
        </div>

        <div [ngClass]="isLoading ? 'items-list loading mb-2' : 'items-list mb-2'" *ngIf="field && searchList.length > 0">
            <div *ngFor="let searchItem of searchList" class="list-item" (click)="searchItemClicked(searchItem, field)">
                <input type="checkbox" [checked]="searchItem.checked" />
                <span class="ml-2">{{searchItem.name}}</span>
            </div>
        </div>
        <ng-template [ngIf]="totalCount">
            <div *ngIf="totalCount == 1; else notOne">
                <span>{{totalCount}} item</span>
            </div>
            <ng-template #notOne>
                <span>{{totalCount}} items</span>
            </ng-template>
        </ng-template>
    </div>
</kendo-popup>
