<div class="billing-container">
    <div class="d-flex filter-btn">
        <outlined-btn text="Filter" iconClass="icon-24 filter-icon" [flip]="true"
            (onClick)="toggleFilter($event)"></outlined-btn>
    </div>
    <div class="left-stuff" *ngIf="showFilter">
        <claim-history-list-filter [showFilter]="showFilter" [filterForm]="filterForm" [historyFilterModels]="historyFilterModels"
           (filterChanged)="onFilterChanged()"></claim-history-list-filter>
    </div>

    <kendo-grid #grid
                [data]="view"
                [pageSize]="state.take" [skip]="state.skip" [sort]="state.sort"
                [pageable]="true" [sortable]="{mode: 'single'}" (sortChange)="onSortChange($event)"
                [filter]="state.filter"
                [autoSize]="true"
                (pageChange)="pageChange($event)"
                [navigable]="true">
        <kendo-grid-column title="Claim Id" [width]="150">
            <ng-template kendoGridHeaderTemplate let-column>
                <span title="Claim ID">Claim ID</span>
            </ng-template>
            <ng-template kendoGridCellTemplate let-dataItem>
                    <span>{{claimIdentifier}}</span>
            </ng-template>

        </kendo-grid-column>
        <kendo-grid-column field="changeDate" title="Date" format="{0:hh:mm a MM/dd/yy}" [width]="170" [maxResizableWidth]="350">
            <ng-template kendoGridHeaderTemplate let-column>
                <span title={{column.title}}>{{column.title}}</span>
            </ng-template>
        </kendo-grid-column>
        <kendo-grid-column field="changeBy" title="User" [width]="250">
            <ng-template kendoGridHeaderTemplate let-column>
                <span title={{column.title}}>{{column.title}}</span>
            </ng-template>
        </kendo-grid-column>
        <kendo-grid-column field="rethinkUser" title="Rethink User" [width]="250">
            <ng-template kendoGridHeaderTemplate let-column>
                <span title={{column.title}}>{{column.title}}</span>
            </ng-template>
            <ng-template kendoGridCellTemplate let-dataItem>
        {{ dataItem.rethinkUser || 'N/A' }}
    </ng-template>
        </kendo-grid-column>
        <kendo-grid-column field="action" title="Action" [width]="150">
            <ng-template kendoGridHeaderTemplate let-column>
                <span title={{column.title}}>{{column.title}}</span>
            </ng-template>
        </kendo-grid-column>
        <kendo-grid-column field="mode" title="Mode" [width]="100">
            <ng-template kendoGridHeaderTemplate let-column>
                <span title={{column.title}}>{{column.title}}</span>
            </ng-template>
        </kendo-grid-column>
        <kendo-grid-column field="description" title="Description" [width]="500">
            <ng-template kendoGridHeaderTemplate let-column>
                <span title={{column.title}}>{{column.title}}</span>
            </ng-template>
        </kendo-grid-column>
        <!-- <kendo-grid-column field="status" title="Status">
            <ng-template kendoGridHeaderTemplate let-column>
                <span title={{column.title}}>{{column.title}}</span>
            </ng-template>
        </kendo-grid-column> -->
        <ng-template kendoGridDetailTemplate let-dataItem [kendoGridDetailTemplateShowIf]="showHistoryDetails">
            <kendo-grid *ngIf="dataItem.details" [data]="dataItem.details">
                <kendo-grid-column field="fieldName" title="Field" [width]="300">
                    <ng-template kendoGridHeaderTemplate let-column>
                        <span title={{column.title}}>{{column.title}}</span>
                    </ng-template>
                </kendo-grid-column>
                <kendo-grid-column field="oldValue" title="Old Value">
                    <ng-template kendoGridHeaderTemplate let-column>
                        <span title={{column.title}}>{{column.title}}</span>
                    </ng-template>
                </kendo-grid-column>
                <kendo-grid-column field="newValue" title="New Value">
                    <ng-template kendoGridHeaderTemplate let-column>
                        <span title={{column.title}}>{{column.title}}</span>
                    </ng-template>
                </kendo-grid-column>
            </kendo-grid>
        </ng-template>
        <ng-template kendoPagerTemplate let-totalPages="totalPages" let=currentPage="currentPage" let-total="total">
            <div style="display:flex; width:100%; justify-content: space-between;">
                <div style="margin: auto 0;"
                     *ngIf="total > 0"
                     class="Body1">
                    Displaying {{getPageStart(total)}}–{{getPageEnd(total)}} of {{total}} items
                </div>
                <div style="display: flex;" class="customePageator">
                    <kendo-pager-page-sizes [pageSizes]="gridPageSizes"></kendo-pager-page-sizes>
                    <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                    <kendo-pager-numeric-buttons [buttonCount]="5"></kendo-pager-numeric-buttons>
                    <kendo-pager-next-buttons></kendo-pager-next-buttons>
                </div>
            </div>
        </ng-template>
    </kendo-grid>
</div>
