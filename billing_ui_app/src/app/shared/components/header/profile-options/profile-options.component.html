<kendo-popup class="user-popup billing-container" #popup [anchor]="anchor" [anchorAlign]="{ horizontal: 'right', vertical: 'bottom' }"
   [popupAlign]="{ horizontal: 'right', vertical: 'top' }" class="sort-popup">
   <div>
      <div class="option-item">
         <div class="icon-text">
            <span class="icon-24 logout-icon" (click)="logOut()"></span>
            <span class="ml-2" (click)="logOut()">Back to BH</span>
         </div>
      </div>
   </div>
</kendo-popup>
