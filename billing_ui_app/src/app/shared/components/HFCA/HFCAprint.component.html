<kendo-dialog-titlebar (close)="cancel()">
    <div id="HFCAheader">
        <div class="title">HCFA Preview</div>
        <div style="display:flex">
            <input type="checkbox" [(ngModel)]="showBackgroud" style="margin: auto;margin-left: 10px;" />
            <label class="small-12reg" style="margin: auto;">Print Back ground</label>
        </div>
    </div>
</kendo-dialog-titlebar>
<div id="HFCAcontent">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.10.0/jquery.min.js" type="text/javascript"></script>
    <div class="backGroundForm">
        <!--TODO:https://www.npmjs.com/package/pdfjs-dist-->
        <pdf-viewer id="viewer"
                class="pdf-source"
                [ngStyle]="{visibility: loadCompleted ? 'hidden': 'visible' }" 
                [src]="pdfPath + pdfSrc"
                (after-load-complete)="loadComplete($event)"
                [render-text]="false"
                [render-text-mode]="renderTextMode"
                [show-all]="false"
                [page]="1"></pdf-viewer>
        <div id="out-container">
            <div class="form-container" *ngFor="let form of myFromsArr; let i = index">
                <div style="width:auto;margin:0 auto;">
                    <div id="print-container">
                        <div id="input-form-{{i}}" [formGroup]="form" novalidate class="pdf-form-input">
                            <div *ngFor="let input of inputList" [ngStyle]="getInputPosition(input)">
                                <input [id]="input.id"
                                       type="text"
                                       [name]="input.name"
                                       [formControlName]="input.name"
                                       readonly>
                            </div>
                        </div>
                        <img [src]="pdfPath + pdfImg" [ngStyle]="style">
                        <div *ngIf="showBackgroud" class="html2pdf__page-break"></div>
                    </div>
                </div>
            </div>
            <!-- <img *ngIf="showBackgroud" [src]="pdfPath + pdfImg2" [ngStyle]="style">
            <div class="html2pdf__page-break"></div> -->
        </div>
    </div>
</div>
<kendo-dialog-actions style="display: inline-block;text-align: center;width:100%;" class="k-button-group  k-dialog-button-layout-stretched ng-star-inserted">
    <span class="icon-24 printer-icon" (click)="new_print()" [class.disabled]="printDisabled"></span>
    <span class="toPDF icon-24 download-icon" (click)="savePDF()" kendoTooltip title="Save as PDF"></span>
</kendo-dialog-actions>
