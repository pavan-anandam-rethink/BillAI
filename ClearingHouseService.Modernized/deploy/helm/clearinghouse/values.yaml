global:
  namespace: clearinghouse
  environment: production
  registry: acrclearinghouse.azurecr.io
  imagePullPolicy: IfNotPresent
  azure:
    keyVault:
      vaultUri: https://kv-clearinghouse.vault.azure.net/

services:
  sftp-ingestion:
    replicaCount: 2
    image: clearinghouse/sftp-ingestion
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: 1000m, memory: 1Gi }
    autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 10, targetCPU: 70 }

  blob-management:
    replicaCount: 2
    image: clearinghouse/blob-management
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: 1000m, memory: 1Gi }
    autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 8, targetCPU: 70 }

  file-metadata:
    replicaCount: 2
    image: clearinghouse/file-metadata
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: 500m, memory: 1Gi }
    autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 6, targetCPU: 70 }

  batch-orchestration:
    replicaCount: 2
    image: clearinghouse/batch-orchestration
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits: { cpu: 2000m, memory: 2Gi }
    autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 10, targetCPU: 60 }

  edi-processing:
    replicaCount: 3
    image: clearinghouse/edi-processing
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits: { cpu: 2000m, memory: 4Gi }
    autoscaling: { enabled: true, minReplicas: 3, maxReplicas: 20, targetCPU: 60 }

  stedi-integration:
    replicaCount: 2
    image: clearinghouse/stedi-integration
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: 1000m, memory: 1Gi }
    autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 8, targetCPU: 70 }

  reconciliation:
    replicaCount: 2
    image: clearinghouse/reconciliation
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: 1000m, memory: 1Gi }
    autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 6, targetCPU: 70 }

  file-tracking:
    replicaCount: 2
    image: clearinghouse/file-tracking
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: 500m, memory: 1Gi }
    autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 8, targetCPU: 70 }

  notification:
    replicaCount: 2
    image: clearinghouse/notification
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 500m, memory: 512Mi }
    autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 4, targetCPU: 70 }

ingress:
  enabled: true
  className: nginx
  host: clearinghouse.internal.example.com
  tlsSecretName: clearinghouse-tls
