apiVersion: apps/v1
kind: Deployment
metadata:
  name: billingservice-web
  namespace: billing
  labels:
    app.kubernetes.io/name: billingservice
    app.kubernetes.io/component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: billingservice
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billingservice
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: billingservice
      automountServiceAccountToken: false
      containers:
        - name: billingservice-web
          image: myacr.azurecr.io/rtabilling/billingserviceweb:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: billingservice-config
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: KeyVaultUri
              valueFrom:
                secretKeyRef:
                  name: billingservice-secrets
                  key: key-vault-uri
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 64198
            capabilities:
              drop:
                - ALL
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: billingservice
              app.kubernetes.io/component: api
