trigger:
  batch: false
  branches:
    include:
      - master
  paths:
    include:
      - Microservices/SummationService.Web/*
      - Microservices/Authentication/*
      - Microservices/SummationService.Domain/*
      - Microservices/Rethink.Services.Common/*
    exclude: 
      - '**/*README.md'
      - '**/*.yaml'
      - '**/*.yml'
pr: none

parameters:
- name: env
  displayName: Environment
  type: string
  default: dev
  values:
  - dev
  - qa
  - prd
  - stg

resources:
 - repo: self
 
variables:
   vmImageName: 'ubuntu-latest'
   dockerfilePath: '$(Build.SourcesDirectory)/Microservices/SummationService.Web/Dockerfile' 
   TagBuild: 'rtabilling/summationserviceweb${{ parameters.env }}:$(Build.BuildNumber)'
   TagLatest: 'rtabilling/summationserviceweb${{ parameters.env }}:latest'
   ${{ if ne(parameters.env, 'prd') }}:
    container: $(devACR)
    login: $(devDockerLogin)
    password: $(devDockerPassword)
   ${{ else }}:
    container: $(ACR)
    login: $(DockerLogin)
    password: $(DockerPassword)
   ${{ if eq(parameters.env, 'dev') }}:
    Environment: 'development'
   ${{ if eq(parameters.env, 'qa') }}:
    Environment: 'qa'
   ${{ if eq(parameters.env, 'stg') }}:
    Environment: 'staging'
   ${{ if eq(parameters.env, 'prd') }}:
    Environment: 'production'
  
stages:
  - template: stage.build.yml