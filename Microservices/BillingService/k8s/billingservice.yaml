apiVersion: v1
kind: Namespace
metadata:
  name: billing
  labels:
    app.kubernetes.io/name: billingservice
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: billingservice-config
  namespace: billing
data:
  ASPNETCORE_ENVIRONMENT: "production"
  ASPNETCORE_URLS: "http://+:8080"
  BillingModernization__Correlation__Enabled: "true"
  BillingModernization__ResponseCompression__Enabled: "true"
  BillingModernization__RateLimiting__Enabled: "false"
  OTEL_SERVICE_NAME: "BillingService"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
---
apiVersion: v1
kind: Secret
metadata:
  name: billingservice-secret-names
  namespace: billing
type: Opaque
stringData:
  KeyVaultUri: "https://replace-with-billing-keyvault.vault.azure.net/"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billingservice-api
  namespace: billing
  labels:
    app.kubernetes.io/name: billingservice
    app.kubernetes.io/component: api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: billingservice
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billingservice
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: billingservice-api
      terminationGracePeriodSeconds: 60
      containers:
        - name: billingservice-api
          image: replace.azurecr.io/billingservice-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: billingservice-config
          env:
            - name: KeyVaultUri
              valueFrom:
                secretKeyRef:
                  name: billingservice-secret-names
                  key: KeyVaultUri
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            failureThreshold: 18
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 20"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: billingservice
              app.kubernetes.io/component: api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: billingservice-api
  namespace: billing
  annotations:
    azure.workload.identity/client-id: "replace-managed-identity-client-id"
---
apiVersion: v1
kind: Service
metadata:
  name: billingservice-api
  namespace: billing
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: billingservice
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: billingservice-api
  namespace: billing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: billingservice-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: billingservice-api
  namespace: billing
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: billingservice
      app.kubernetes.io/component: api
