{{- $services := list "sftp-ingestion" "edi-processing-worker" "batch-orchestration" "reconciliation" "file-tracking-api" "notification" }}
{{- range $service := $services }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $service }}-pdb
  namespace: {{ $.Values.global.namespace }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: {{ $service }}
---
{{- end }}
