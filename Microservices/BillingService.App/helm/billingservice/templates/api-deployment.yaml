apiVersion: apps/v1
kind: Deployment
metadata:
  name: billingservice-app-api
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: billingservice-app-api
  template:
    metadata:
      labels:
        app: billingservice-app-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: billingservice-app-config
            - secretRef:
                name: billingservice-app-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080

