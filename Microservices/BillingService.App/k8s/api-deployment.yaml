apiVersion: apps/v1
kind: Deployment
metadata:
  name: billingservice-app-api
  namespace: billingservice
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: billingservice-app-api
  template:
    metadata:
      labels:
        app: billingservice-app-api
    spec:
      containers:
        - name: api
          image: yourregistry.azurecr.io/billingservice-app-api:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: billingservice-app-config
            - secretRef:
                name: billingservice-app-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

