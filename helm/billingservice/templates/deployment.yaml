apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "billingservice.fullname" . }}
  labels:
    app.kubernetes.io/name: billingservice
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: billingservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billingservice
    spec:
      serviceAccountName: {{ include "billingservice.fullname" . }}
      containers:
        - name: billingservice-web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.service.targetPort }}"
            - name: KeyVaultUri
              value: {{ .Values.keyVaultUri | quote }}
            - name: BillingService__Modernization__EnableCleanArchitectureAdapters
              value: {{ .Values.modernization.enableCleanArchitectureAdapters | quote }}
            - name: BillingService__Modernization__EnableDistributedCacheDecorators
              value: {{ .Values.modernization.enableDistributedCacheDecorators | quote }}
            - name: BillingService__Modernization__EnableOutboxPublisher
              value: {{ .Values.modernization.enableOutboxPublisher | quote }}
            - name: BillingService__Modernization__EnableReadModelQueries
              value: {{ .Values.modernization.enableReadModelQueries | quote }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
{{ toYaml .Values.resources | indent 12 }}
